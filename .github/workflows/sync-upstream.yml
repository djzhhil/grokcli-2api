name: Sync upstream main

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure remotes
        run: |
          git remote add upstream https://github.com/HM2899/grokcli-2api.git
          git fetch --prune origin main
          git fetch --prune upstream main

      - name: Merge upstream when needed
        run: |
          set -euo pipefail
          if git diff --quiet main upstream/main; then
            echo "Fork main is already up to date."
            exit 0
          fi

          git switch main
          git merge --no-edit --no-ff upstream/main || {
            echo "Upstream merge has conflicts; stopping for manual resolution." >&2
            git merge --abort || true
            exit 1
          }

      - name: Push merged main
        run: |
          set -euo pipefail
          if git diff --quiet origin/main main; then
            echo "No merge commit to push."
            exit 0
          fi
          git push origin main
